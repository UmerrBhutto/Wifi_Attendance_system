<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Employees</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a;
      --accent:#4f8ef7; --green:#22c55e; --red:#ef4444;
      --text:#e2e8f0; --muted:#64748b; --radius:12px;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding:24px; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); }
    .header h1 { font-size:1.5rem; font-weight:700; }
    .header h1 span { color:var(--accent); }
    .header p { color:var(--muted); font-size:0.85rem; margin-top:4px; }
    .nav { margin-bottom:24px; }
    .nav a { color:var(--accent); text-decoration:none; font-size:0.85rem; font-weight:500; margin-right:20px; padding-bottom:4px; border-bottom:2px solid transparent; }
    .nav a.active { border-bottom-color:var(--accent); }

    .layout { display:grid; grid-template-columns: 380px 1fr; gap:20px; }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }

    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }
    .card h2 { font-size:1rem; font-weight:600; margin-bottom:18px; }

    .field { margin-bottom:16px; }
    .field label { display:block; font-size:0.78rem; color:var(--muted); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
    .field input {
      width:100%; padding:11px 14px; background:#11131b; border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-size:0.9rem; font-family:'Inter',sans-serif;
      outline:none; transition:border-color 0.15s;
    }
    .field input:focus { border-color:var(--accent); }
    .field input::placeholder { color:var(--muted); }

    .btn {
      width:100%; padding:12px; background:var(--accent); color:#fff; border:none;
      border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:opacity 0.15s;
    }
    .btn:hover { opacity:0.9; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }

    .msg { margin-top:14px; padding:10px 14px; border-radius:8px; font-size:0.85rem; display:none; }
    .msg.success { background:rgba(34,197,94,0.12); color:var(--green); display:block; }
    .msg.error   { background:rgba(239,68,68,0.12); color:var(--red); display:block; }

    table { width:100%; border-collapse:collapse; }
    thead th { padding:12px 16px; text-align:left; font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:600; background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); }
    tbody tr { border-bottom:1px solid var(--border); }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(255,255,255,0.03); }
    td { padding:14px 16px; font-size:0.88rem; }
    .mono { font-family:'JetBrains Mono', monospace; font-size:0.85rem; color:var(--muted); }

    .delete-btn {
      background:rgba(239,68,68,0.12); color:var(--red); border:none; padding:6px 12px;
      border-radius:6px; font-size:0.78rem; font-weight:600; cursor:pointer;
    }
    .delete-btn:hover { background:rgba(239,68,68,0.22); }

    .empty { text-align:center; padding:50px 24px; color:var(--muted); }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>WiFi <span>Attendance</span></h1>
      <p>Manage Employees</p>
    </div>
  </div>

  <nav class="nav">
    <a href="/">Today</a>
    <a href="/history">History</a>
    <a href="/employees" class="active">Employees</a>
  </nav>

  <div class="layout">
    <!-- Add Employee Form -->
    <div class="card">
      <h2>Add New Employee</h2>
      <form id="add-form">
        <div class="field">
          <label>Employee ID</label>
          <input type="text" id="emp_id" placeholder="e.g. EMP001" required>
        </div>
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="e.g. Ali Hassan" required>
        </div>
        <div class="field">
          <label>MAC Address</label>
          <input type="text" id="mac" placeholder="e.g. A4:C3:F0:85:23:01" required>
        </div>
        <button type="submit" class="btn" id="submit-btn">Add Employee</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>

    <!-- Employee List -->
    <div class="card">
      <h2>All Employees</h2>
      <div id="employee-list">
        <div class="empty">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    async function loadEmployees() {
      try {
        const res = await fetch('/api/employees');
        const data = await res.json();
        const container = document.getElementById('employee-list');

        if (data.employees.length === 0) {
          container.innerHTML = '<div class="empty">No employees registered yet.</div>';
          return;
        }

        let rows = data.employees.map(e => `
          <tr>
            <td>${e.employee_id}</td>
            <td><strong>${e.name}</strong></td>
            <td class="mono">${e.mac_address}</td>
            <td><button class="delete-btn" onclick="deleteEmployee('${e.employee_id}')">Remove</button></td>
          </tr>`).join('');

        container.innerHTML = `
          <table>
            <thead><tr><th>ID</th><th>Name</th><th>MAC Address</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch (e) {
        console.error(e);
      }
    }

    async function deleteEmployee(empId) {
      if (!confirm(`Remove employee ${empId}?`)) return;
      try {
        const res = await fetch(`/api/employees/${empId}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          loadEmployees();
        } else {
          alert(data.message || 'Failed to remove employee');
        }
      } catch (e) {
        alert('Error removing employee');
      }
    }

    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const empId = document.getElementById('emp_id').value.trim();
      const name  = document.getElementById('name').value.trim();
      const mac   = document.getElementById('mac').value.trim();
      const msg   = document.getElementById('msg');
      const btn   = document.getElementById('submit-btn');

      btn.disabled = true;
      btn.textContent = 'Adding...';
      msg.className = 'msg';

      try {
        const res = await fetch('/api/employees', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employee_id: empId, name: name, mac_address: mac })
        });
        const data = await res.json();

        if (data.success) {
          msg.textContent = `✅ ${name} added successfully!`;
          msg.className = 'msg success';
          document.getElementById('add-form').reset();
          loadEmployees();
        } else {
          msg.textContent = `❌ ${data.message}`;
          msg.className = 'msg error';
        }
      } catch (err) {
        msg.textContent = '❌ Failed to connect to server';
        msg.className = 'msg error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Add Employee';
      }
    });

    loadEmployees();
  </script>

</body>
</html>
